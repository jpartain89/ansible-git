---
# Custom destroy playbook that replaces the driver's built-in to work around the
# ansible-core 2.19 boolean-in-when breaking change. The driver's internal destroy.yml
# uses `when: (lookup('env', 'HOME'))` which evaluates a string as a boolean, now
# forbidden. This playbook uses `is truthy` which returns an explicit boolean.
- name: Destroy
  hosts: localhost
  connection: local
  gather_facts: false
  no_log: "{{ molecule_no_log }}"
  tasks:
    - name: Git | Destroy | Set async_dir for HOME env
      ansible.builtin.set_fact:
        ansible_async_dir: "{{ lookup('env', 'HOME') }}/.ansible_async/"
      when: lookup('env', 'HOME') is truthy

    - name: Git | Destroy | Destroy molecule instance(s)
      community.docker.docker_container:
        name: "{{ item.name }}"
        docker_host: "{{ item.docker_host | default(lookup('env', 'DOCKER_HOST') or 'unix://var/run/docker.sock') }}"
        state: absent
        force_kill: "{{ item.force_kill | default(true) }}"
        keep_volumes: "{{ item.keep_volumes | default(true) }}"
      register: server
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
      async: 7200
      poll: 0

    - name: Git | Destroy | Wait for instance(s) deletion to complete
      ansible.builtin.async_status:
        jid: "{{ item.ansible_job_id }}"
      register: docker_jobs
      until: docker_jobs is finished
      retries: 300
      loop: "{{ server.results }}"
      loop_control:
        label: "{{ item.item.name }}"
