---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
driver:
  name: docker
platforms:
  - name: instance
    image: 'debian:12'
    pre_build_image: true
provisioner:
  name: ansible
  playbooks:
    prepare: prepare.yml
    destroy: destroy.yml
verifier:
  name: testinfra
  directory: ../tests
